[package]
name = "ironrdp-tokio"
version = "0.8.0"
readme = "README.md"
description = "`Framed*` traits implementation above Tokio’s traits"
edition.workspace = true
rust-version = "1.89"
license.workspace = true
homepage.workspace = true
repository.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
doctest = false
test = false

[features]
default = []
reqwest = ["dep:reqwest", "dep:sspi", "dep:url", "dep:ironrdp-connector"]
reqwest-rustls-ring = ["reqwest", "reqwest?/rustls-tls-webpki-roots"]
reqwest-native-tls = ["reqwest", "reqwest?/native-tls"]

[dependencies]
ironrdp-async = { path = "../ironrdp-async", version = "0.8" } # public
ironrdp-connector = { path = "../ironrdp-connector", version = "0.8", optional = true }
tokio = { version = "1", features = ["io-util"] }
reqwest = { version = "0.12", default-features = false, features = ["http2", "system-proxy"], optional = true }
sspi = { git = "https://github.com/Devolutions/sspi-rs", rev = "2ded76b76734110d45de2270d3c782c561fe54d1", version = "0.18", features = ["network_client", "dns_resolver"], optional = true } # FIXME: Replace with next sspi release
url = { version = "2.5", optional = true }

[lints]
workspace = true
