[package]
name = "ironrdp-replay-bench"
version = "0.0.0"
edition.workspace = true
license.workspace = true
publish = false
description = "Deterministic replay benchmark + correctness gate for IRDPREC1 captures"

[[bin]]
name = "ironrdp-replay-bench"
path = "src/main.rs"

[dependencies]
ironrdp = { path = "../ironrdp", features = [
    "session",
    "connector",
    "graphics",
    "pdu",
] }
ironrdp-replay-core = { path = "../ironrdp-replay-core" }
ironrdp-tokio = { path = "../ironrdp-tokio" }

anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "io-util", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
